CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_EXT_POWER=y

# Upstream Zephyr 4.1 ships its own pixart,pmw3610 driver that's auto-enabled
# (CONFIG_INPUT_PMW3610 defaults y when DT has a node with status="okay").
# All tuning that the kumamuk-git fork did via Kconfig (CPI, smart-algorithm,
# orientation, etc.) is now devicetree properties on the trackball node in
# keyball39_right.overlay.

CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# Custom status screen for the OLED label-flash feature on &totp. Replaces
# upstream's layer-status widget with our layer-or-TOTP variant
# (widget_layer_or_totp.c) wired into a custom screen (status_screen_custom.c).
#
# Switching from BUILT_IN to CUSTOM drops the `imply`/`select` chain that
# BUILT_IN provides for the per-widget Kconfigs, LV_USE_LABEL, LV_USE_THEME_MONO,
# and crucially LV_Z_MEM_POOL_SIZE — without the 4 KB pool size set explicitly,
# LVGL's default pool is tiny, lv_label_create() returns NULL inside the widget
# init, and the resulting NULL deref hard-faults the right half before USB or
# BLE come up (symptom: OLED shows uninitialised SSD1306 noise, left half
# can't pair). All of these are re-enabled here.
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
CONFIG_LV_USE_LABEL=y
CONFIG_LV_USE_THEME_MONO=y
CONFIG_LV_Z_MEM_POOL_SIZE=4096
