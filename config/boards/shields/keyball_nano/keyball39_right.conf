CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_EXT_POWER=y

# Upstream Zephyr 4.1 ships its own pixart,pmw3610 driver that's auto-enabled
# (CONFIG_INPUT_PMW3610 defaults y when DT has a node with status="okay").
# All tuning that the kumamuk-git fork did via Kconfig (CPI, smart-algorithm,
# orientation, etc.) is now devicetree properties on the trackball node in
# keyball39_right.overlay.

CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# Custom status screen / widget is temporarily disabled; revert to the
# upstream BUILT_IN status screen so the layer-status widget renders the
# layer name like before. The OLED label flash on &totp is pending re-enable
# once the boot crash is isolated.
