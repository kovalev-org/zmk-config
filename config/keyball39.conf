# OLED fonts (LVGL 9 / Zephyr 4.1).
#
# Background: LVGL 9 ships 4-bpp anti-aliased Montserrat fonts. The new
# 1-bit (LV_COLOR_FORMAT_I1) rasterizer thresholds alpha aggressively, which
# fattens glyph edges and makes round letters collide — Montserrat 12 in
# particular produced "Base"/"Nav" that looked barely readable.
#
# UNSCII is a pure 1-bpp bitmap font (clean, no AA) but has no glyphs in the
# Private-Use-Area range where LVGL puts its symbol set (LV_SYMBOL_BATTERY_*,
# _WIFI, _USB, _OK, _KEYBOARD, _CLOSE, etc.) — using UNSCII as the *default*
# breaks every status-screen icon.
#
# Split:
# - LARGE / default font (battery/wpm/output/peripheral widgets use this):
#   Montserrat 16. Big enough that 1-bpp thresholding doesn't smush the icons,
#   and these widgets need the LV_SYMBOL_* PUA glyphs to render.
# - SMALL font (only the layer-status widget uses it, via
#   `lv_theme_get_font_small`): UNSCII 8. Layer names ("Base", "Nav", ...) are
#   ASCII and render crisply; the trade-off is that the LV_SYMBOL_KEYBOARD
#   prefix on the layer label renders as a small rectangle (tofu). If you'd
#   rather have the keyboard glyph back at the cost of slightly mushy small
#   text, swap to CONFIG_ZMK_LV_FONT_DEFAULT_SMALL_MONTSERRAT_14=y.
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_16=y
CONFIG_ZMK_LV_FONT_DEFAULT_SMALL_UNSCII_8=y